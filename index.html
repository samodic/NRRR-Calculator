<!DOCTYPE html>
<html>
<head>
  <title>NRRR Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 350px;
      margin: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      text-align: left;
      margin-top: 10px;
      font-size: 14px;
    }

    input {
      width: 95%;
      padding: 10px;
      margin-top: 5px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      margin: 10px 5px 0 5px;
      cursor: pointer;
    }

    .btn-primary {
      background: blue;
      color: white;
    }

    .btn-reset {
      background: red;
      color: white;
    }

    .result {
      margin-top: 15px;
      font-size: 16px;
    }

    .nrrr-highlight {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .history {
      margin-top: 15px;
      font-size: 14px;
      text-align: left;
    }

    .note {
      font-size: 12px;
      color: gray;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>NRRR Calculator</h2>

  <div class="note">
    All calculations are from <b>Team 1’s perspective</b>
  </div>

  <label>Team 1 Score (S1)</label>
  <input id="s1" type="number">

  <label>Team 2 Score (S2)</label>
  <input id="s2" type="number">

  <label>Par Score for Team 2 (P2)</label>
  <input id="p2" type="number">

  <button class="btn-primary" onclick="calculate()">Add Match</button>
  <button class="btn-reset" onclick="resetAll()">Reset</button>

  <div class="result" id="rrr1"></div>
  <div class="result" id="rrr2"></div>
  <div class="nrrr-highlight" id="nrrr"></div>

  <div class="history" id="history"></div>
</div>

<script>
let matches = JSON.parse(localStorage.getItem("matches")) || [];

function calculate() {
  let s1Input = document.getElementById("s1");
  let s2Input = document.getElementById("s2");
  let p2Input = document.getElementById("p2");

  let S1 = parseFloat(s1Input.value);
  let S2 = parseFloat(s2Input.value);
  let P2 = parseFloat(p2Input.value);

  if (isNaN(S1) || isNaN(S2) || isNaN(P2) || P2 === 0) {
    alert("Invalid input");
    return;
  }

  let rrr = (S1 / 100) * (1 - (S2 / P2));

  // Store last 5 matches
  matches.push(rrr);
  if (matches.length > 5) matches.shift();

  localStorage.setItem("matches", JSON.stringify(matches));

  updateUI(rrr);

  // Clear inputs
  s1Input.value = "";
  s2Input.value = "";
  p2Input.value = "";
  s1Input.focus();
}

function updateUI(latestRRR) {
  let rrr_team1 = latestRRR;
  let rrr_team2 = -latestRRR;

  let nrrr_team1 = matches.reduce((a,b) => a + b, 0);

  // RRR display
  document.getElementById("rrr1").innerHTML =
    "RRR (Team 1): " + rrr_team1.toFixed(4);

  document.getElementById("rrr2").innerHTML =
    "RRR (Team 2): " + rrr_team2.toFixed(4);

  // Color-coded NRRR
  let color = nrrr_team1 >= 0 ? "green" : "red";

  document.getElementById("nrrr").innerHTML =
    `<span style="color:${color}">
      Final NRRR (Team 1): ${nrrr_team1.toFixed(4)}
     </span>`;

  // History
  let historyText = "<b>Last Matches:</b><br>";
  matches.forEach((m, i) => {
    historyText += "Match " + (i+1) + ": " + m.toFixed(4) + "<br>";
  });

  document.getElementById("history").innerHTML = historyText;
}

function resetAll() {
  if (confirm("Reset all match data?")) {
    matches = [];
    localStorage.removeItem("matches");

    document.getElementById("rrr1").innerHTML = "";
    document.getElementById("rrr2").innerHTML = "";
    document.getElementById("nrrr").innerHTML = "";
    document.getElementById("history").innerHTML = "";
  }
}

// Load previous state
if (matches.length > 0) {
  updateUI(matches[matches.length - 1]);
}
</script>

</body>
</html>
